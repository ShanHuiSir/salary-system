# ============================================
# 薪酬系统 - Docker Compose 生产部署
# ============================================
# 使用方式:
#   1. 复制 .env.example 为 .env 并修改密码
#   2. docker compose up -d
#   3. 访问 http://localhost
# ============================================

version: "3.8"

services:
  # ===== PostgreSQL 数据库 =====
  postgres:
    image: postgres:17-alpine
    container_name: salary-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: salary_db
      POSTGRES_USER: ${DB_USER:-salary_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-salary_admin} -d salary_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== 后端 API 服务 =====
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: salary-server
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-salary_admin}:${DB_PASSWORD:-change-me-in-production}@postgres:5432/salary_db"
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-to-another-random}
      JWT_EXPIRES_IN: "2h"
      JWT_REFRESH_EXPIRES_IN: "7d"
      PORT: "3000"
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  # ===== 前端 (Nginx 静态服务) =====
  client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salary-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:80"
    depends_on:
      - server

volumes:
  pgdata:
    driver: local
