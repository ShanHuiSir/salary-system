# ============================================
# 薪酬系统 - Docker Compose 生产部署
# ============================================
# 使用方式:
#   1. 复制 .env.example 为 .env 并修改密码
#   2. docker compose up -d
#   3. 访问 http://localhost
# ============================================

services:
  # ===== PostgreSQL 数据库 =====
  postgres:
    image: postgres:17-alpine
    container_name: salary-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: salary_db
      POSTGRES_USER: ${DB_USER:-salary_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?请先在 .env 中设置 DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-salary_admin} -d salary_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== 后端 API 服务 =====
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: salary-server
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-salary_admin}:${DB_PASSWORD:?请先在 .env 中设置 DB_PASSWORD}@postgres:5432/salary_db"
      JWT_SECRET: ${JWT_SECRET:?请先在 .env 中设置 JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?请先在 .env 中设置 JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: "2h"
      JWT_REFRESH_EXPIRES_IN: "7d"
      PORT: "3000"
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?请先在 .env 中设置 ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===== 前端 (Nginx 静态服务) =====
  client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salary-client
    restart: unless-stopped
    ports:
      # 内网部署建议在 .env 中设置 CLIENT_BIND 为服务器内网 IP，例如 192.168.1.10
      - "${CLIENT_BIND:-0.0.0.0}:${CLIENT_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
